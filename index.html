<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Patch for 'Cannot set property fetch of #<Window> which has only a getter'
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            var _fetch = window.fetch;
            try {
              Object.defineProperty(window, 'fetch', {
                get: function() { return _fetch; },
                set: function(v) { _fetch = v; },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // If defineProperty fails, try a simple assignment if possible
              // though it likely won't work if it's a getter-only property.
              console.warn('Object.defineProperty on fetch failed, attempting fallback');
            }
          }
        } catch (e) {
          console.warn('Failed to patch fetch in index.html:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
